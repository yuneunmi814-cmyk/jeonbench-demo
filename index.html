<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>우리가게 에너지벤치</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone">

  <header class="bar">
    <div class="logo">우리가게 <b>에너지벤치</b></div>
    <button id="keyBtn" class="key" title="API 설정">⚙</button>
  </header>
  <div class="dots"><span class="dot act"></span><span class="dot"></span><span class="dot"></span></div>

  <!-- 1. 고지서 인식 -->
  <section id="s1" class="screen on">
    <h2>에너지 고지서로 1분 진단</h2>
    <p class="lead">전기·가스 고지서를 올리면 AI가 용도·사용량을 읽고<br>같은 동네·같은 업종과 비교해 드려요.</p>

    <label class="drop" for="fileIn">
      <div class="cam"></div>
      <div class="dtitle">에너지 고지서(전기·가스) 촬영·업로드</div>
      <div class="dsub">용도·사용량 AI 자동인식</div>
      <input id="fileIn" type="file" accept="image/*" hidden>
    </label>

    <div class="or">또는 샘플로 바로 체험</div>
    <div id="samples" class="samples"></div>

    <div id="scanState" class="scan">
      <div class="spin"></div>
      <div>AI가 고지서를 읽는 중…</div>
      <div class="track"><div id="scanBar" class="fill"></div></div>
    </div>

    <div id="billCard" class="card">
      <div class="ctitle">인식 결과 — 내 가게</div>
      <div id="billBody"></div>
    </div>
    <button id="toBench" class="cta">동종업계와 비교하기 →</button>
  </section>

  <!-- 2. 벤치마크 -->
  <section id="s2" class="screen">
    <div class="shead">동종업계 벤치마크</div>
    <p class="lead2">같은 동네·같은 업종 대비</p>
    <div id="benchTop" class="huge red">상위 12%</div>
    <div id="benchSub" class="sub">전기요금 많이 내는 편</div>

    <div class="gauge">
      <div class="bar"></div>
      <div id="marker" class="mk" style="left:84%"><span>내 가게</span></div>
    </div>
    <div class="scale"><span>저렴</span><span>중앙값</span><span>과납</span></div>

    <div id="benchMsg" class="msg warn"></div>
    <div id="benchNote" class="note"></div>

    <div class="nav">
      <button id="back2" class="ghost">← 고지서</button>
      <button id="toRx" class="cta">AI 절감 처방 받기 →</button>
    </div>
  </section>

  <!-- 3. 처방 -->
  <section id="s3" class="screen">
    <div class="shead">AI 절감 처방</div>
    <div id="rxList"></div>

    <div class="savebox">
      <div id="saveLabel" class="slabel">계약 변경 시 연간 절감 예상액</div>
      <div id="saveBig" class="sbig">₩1,180,000</div>
    </div>
    <button id="applyBtn" class="cta">요금제 변경 신청 →</button>
    <div id="rxNote" class="note">※ 절감액은 공급사 요금표 기반 추정. 실제 변경 가부는 공급사 확인 필요.</div>

    <div class="nav"><button id="back3" class="ghost">← 벤치마크</button></div>
  </section>

  <footer class="foot">한국가스공사 공공데이터 기반 · 데모 · 프로젝트윤</footer>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
